name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (${{ matrix.app }})
        run: npm run lint --workspace=apps/${{ matrix.app }}

      - name: Typecheck (${{ matrix.app }})
        run: npm run typecheck --workspace=apps/${{ matrix.app }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test (${{ matrix.app }})
        run: npm test --workspace=apps/${{ matrix.app }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        app: [web, api]
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.app }})
        run: npm run build --workspace=apps/${{ matrix.app }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/lumora_e2e
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: e2e-access-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: e2e-refresh-secret-at-least-32-chars-long
      ACCESS_TTL: 15m
      REFRESH_TTL: 7d
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start API server
        run: node apps/api/dist/server.js &
        env:
          PORT: 4000

      - name: Start Web server
        run: node apps/web/.next/standalone/server.js &
        env:
          PORT: 3000
          HOSTNAME: 0.0.0.0

      - name: Seed database
        run: npm run seed
        env:
          MONGODB_URI: mongodb://localhost:27017/lumora_e2e

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:4000/api/v1/health http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=high
        continue-on-error: true
